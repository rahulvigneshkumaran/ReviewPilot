[build]
  base = "frontend"
  command = "npm run build"
  publish = "out"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Build-time environment variables — NEXT_PUBLIC_* are baked into the static bundle
# You MUST also set these in Netlify UI: Site settings → Environment variables
[build.environment]
  NODE_VERSION = "20"
  NEXT_PUBLIC_API_URL = "https://reviewpilot-hvrp.onrender.com/api/v1"
