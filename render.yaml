services:
  # ReviewPilot FastAPI Backend Service
  - type: web
    name: reviewpilot-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.3
      - key: API_V1_STR
        value: /api/v1
